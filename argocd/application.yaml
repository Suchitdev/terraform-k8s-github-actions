apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: terraform-k8s-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/suchitdev/terraform-k8s-github-actions.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true